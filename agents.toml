version = 1

[[sync]]
source = "scripts/simplify-code"
destination = "scripts/simplify-code"

[[sync]]
source = "scripts/gh-issue"
destination = "scripts/gh-issue"

[[sync]]
source = "scripts/memlog"
destination = "scripts/memlog"

[[sync]]
source = "scripts/review-branch"
destination = "scripts/review-branch"

[[sync]]
source = "scripts/review-code"
destination = "scripts/review-code"

[[sync]]
source = ".rules"
destination = "AGENTS.md"

[providers]

[providers.claude]
sync = [
  { source = ".rules", destination = "CLAUDE.md" },
  { source = ".rules", destination = ".claude/CLAUDE.md", scope = "global" },
  { source = "scripts", destination = ".claude/commands", scope = "both" },
  { source = "skills", destination = ".claude/skills", scope = "both" },
  { source = "claude/settings.json", destination = ".claude/settings.json", scope = "both" },
  { source = "skills/git-guardrails/scripts/block-dangerous-git", destination = ".claude/hooks/block-dangerous-git", skill = "git-guardrails" }
]

[providers.copilot]
sync = [
  { source = ".rules", destination = ".github/copilot-instructions.md" },
  { source = "copilot/review.prompt.md", destination = ".github/prompts/dotagents-review.prompt.md" },
  { source = "copilot/agents/reviewer.agent.md", destination = ".github/agents/dotagents-reviewer.agent.md" },
  { source = "copilot/hooks/git-guardrails.json", destination = ".github/hooks/git-guardrails.json" },
  { source = "skills/git-guardrails/scripts/block-dangerous-git", destination = ".github/hooks/block-dangerous-git", skill = "git-guardrails" }
]

[providers.gemini]
sync = [
  { source = ".rules", destination = "GEMINI.md" },
  { source = ".rules", destination = ".gemini/GEMINI.md", scope = "global" },
  { source = "gemini/settings.json", destination = ".gemini/settings.json" }
]

[providers.codex]
sync = [
  { source = ".rules", destination = "CODEX.md" },
  { source = "codex/config.toml", destination = ".codex/config.toml" },
  { source = "codex/agents/reviewer.toml", destination = ".codex/agents/reviewer.toml" }
]
